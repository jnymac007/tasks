<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Task Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --star-blue: #3b82f6; --star-yellow: #FFD700; --star-orange: #FF8C00; --star-red: #ef4444;
            --ui-bg: #313131; --ui-shading: #3d3d3d; --accent-orange: #FF8C00; --light-gray: #d1d5db;
        }
        body { font-family: -apple-system, sans-serif; background-color: var(--ui-bg); color: #f8fafc; overscroll-behavior: none; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        nav { height: 80px; flex-shrink: 0; }
        
        #main-content { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; flex-grow: 1; height: calc(100vh - 80px); }
        .column-wrapper { flex: 0 0 85vw; padding: 0 12px; scroll-snap-align: center; border-right: 1px solid rgba(255, 255, 255, 0.05); display: flex; flex-direction: column; height: 100%; }
        .column-wrapper:nth-child(even) { background-color: var(--ui-shading); }
        @media (min-width: 768px) { .column-wrapper { flex: 0 0 300px; scroll-snap-align: start; } }
        
        .kanban-column { flex-grow: 1; overflow-y: auto; overflow-x: hidden; padding-right: 2px; margin-bottom: 4px; -webkit-overflow-scrolling: touch; }
        .kanban-column::-webkit-scrollbar { width: 3px; }
        .kanban-column::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .card { background: #ffffff; border-radius: 1.25rem; padding: 1.2rem; margin-bottom: 0.75rem; box-shadow: 0 8px 16px -4px rgba(0, 0, 0, 0.4); color: #1a1a1a; position: relative; -webkit-touch-callout: none; user-select: none; touch-action: manipulation; }
        textarea { background: transparent; border: none; outline: none; resize: none; width: 100%; font-family: inherit; font-size: 14px; font-weight: 600; color: #111827; padding: 0; margin: 0; user-select: text; }
        
        .list-label { color: var(--accent-orange); font-size: 14px; font-weight: 900; letter-spacing: 0.15em; text-transform: uppercase; }
        .btn-add { width: 100%; padding: 6px; font-size: 24px; font-weight: 300; color: rgba(255,255,255,0.15); border-radius: 0.75rem; transition: all 0.2s; line-height: 1; flex-shrink: 0; }
        .btn-add:hover { color: var(--accent-orange); }
        
        #lock-screen { position: fixed; inset: 0; z-index: 200; background: var(--ui-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .glass { background: rgba(49, 49, 49, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .star-blue { color: var(--star-blue); } .star-yellow { color: var(--star-yellow); } .star-orange { color: var(--star-orange); } .star-red { color: var(--star-red); }
    </style>
</head>
<body>

    <!-- Lock Screen -->
    <div id="lock-screen">
        <h1 class="text-[#d1d5db] text-[16px] font-black tracking-[0.4em] uppercase mb-8">System Locked</h1>
        <div class="flex flex-col gap-4 w-72">
            <input type="password" id="master-key" placeholder="Enter Personal Key" class="bg-[#3d3d3d] border border-white/10 rounded-full px-6 py-4 text-white text-center text-sm outline-none focus:border-[#FF8C00] transition-all">
            <button onclick="app.unlock()" class="bg-[#FF8C00] text-white py-4 rounded-full font-bold text-xs tracking-widest uppercase shadow-xl hover:scale-105 transition-all">
                Unlock Workspace
            </button>
        </div>
        <p class="text-white/10 text-[9px] mt-12 uppercase tracking-[0.3em]">Encrypted Sync Active</p>
    </div>

    <!-- App Content -->
    <div id="app-content" class="hidden h-full flex flex-col">
        <nav class="flex justify-between items-center px-8 py-4 glass z-50">
            <div class="flex flex-col">
                <h1 class="text-[14px] font-black tracking-[0.3em] uppercase text-[#d1d5db] mb-1">Task Manager</h1>
                <div class="flex gap-6">
                    <button onclick="app.toggleView('project')" id="btn-project" class="text-[14px] font-bold uppercase transition">Projects</button>
                    <button onclick="app.toggleView('priority')" id="btn-priority" class="text-[14px] font-bold uppercase transition">Priorities</button>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="app.lock()" class="text-[10px] font-black text-[#d1d5db] uppercase tracking-widest hover:text-[#FF8C00]">Lock</button>
            </div>
        </nav>
        <div id="main-content"></div>
    </div>

    <!-- Priority Picker -->
    <div id="priority-popup" class="hidden fixed inset-0 bg-black/70 backdrop-blur-md flex items-end sm:items-center justify-center z-[100]">
        <div class="w-full sm:w-80 bg-[#313131] p-8 rounded-t-[2.5rem] sm:rounded-[3rem] border border-white/5 text-center shadow-2xl">
            <div class="flex flex-col gap-2">
                <button onclick="app.setPriority('red')" class="flex items-center gap-4 p-4 hover:bg-white/5 rounded-2xl transition text-left"><span class="text-3xl star-red">★</span><div class="text-[12px] font-black text-red-500 uppercase">Today</div></button>
                <button onclick="app.setPriority('orange')" class="flex items-center gap-4 p-4 hover:bg-white/5 rounded-2xl transition text-left"><span class="text-3xl star-orange">★</span><div class="text-[12px] font-black text-orange-500 uppercase">This Week</div></button>
                <button onclick="app.setPriority('yellow')" class="flex items-center gap-4 p-4 hover:bg-white/5 rounded-2xl transition text-left"><span class="text-3xl star-yellow">★</span><div class="text-[12px] font-black text-yellow-500 uppercase">Soon</div></button>
                <button onclick="app.setPriority('blue')" class="flex items-center gap-4 p-4 hover:bg-white/5 rounded-2xl transition text-left"><span class="text-3xl star-blue">★</span><div class="text-[12px] font-black text-blue-500 uppercase">Someday</div></button>
            </div>
            <button onclick="app.closePopup()" class="mt-8 text-[12px] font-bold text-gray-400 uppercase tracking-widest text-center w-full">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCRSI7mZQDo6WiECYM4Cbh3ZEOZjnH6YaU",
            authDomain: "my-tasks-319e9.firebaseapp.com",
            databaseURL: "https://my-tasks-319e9-default-rtdb.firebaseio.com",
            projectId: "my-tasks-319e9",
            storageBucket: "my-tasks-319e9.firebasestorage.app",
            messagingSenderId: "789706458775",
            appId: "1:789706458775:web:bf61fcdba5d9cbf59f4bd2"
        };

        const fbApp = initializeApp(firebaseConfig);
        const db = getDatabase(fbApp);

        window.app = {
            vaultKey: localStorage.getItem('task_vault_key') || "",
            tasks: [],
            projects: ["Inbox"],
            prioritiesArr: ["red", "orange", "yellow", "blue"],
            viewMode: 'project',
            activeTaskId: null,
            editingId: null,

            unlock: function() {
                const input = document.getElementById('master-key').value.trim();
                if (input.length < 4) return alert("Key must be at least 4 characters.");
                
                // Security: This transforms your password into a long random string
                // so no one can guess the path in the database.
                this.vaultKey = btoa(input + "jnymac_salt_99").replace(/=/g, "");
                localStorage.setItem('task_vault_key', this.vaultKey);
                this.init();
            },

            lock: function() {
                localStorage.removeItem('task_vault_key');
                window.location.reload();
            },

            init: function() {
                if (!this.vaultKey) return;
                document.getElementById('lock-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');

                const dataRef = ref(db, 'vaults/' + this.vaultKey);
                onValue(dataRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        this.tasks = data.tasks || [];
                        this.projects = data.projects || ["Inbox"];
                        this.prioritiesArr = data.priorities || ["red", "orange", "yellow", "blue"];
                        this.render();
                    } else {
                        this.save(); 
                    }
                });
            },

            save: function() {
                if (!this.vaultKey) return;
                set(ref(db, 'vaults/' + this.vaultKey), { 
                    tasks: this.tasks, 
                    projects: this.projects, 
                    priorities: this.prioritiesArr 
                });
            },

            render: function() {
                const main = document.getElementById('main-content');
                main.innerHTML = '';
                document.getElementById('btn-project').style.color = (this.viewMode === 'project') ? 'var(--accent-orange)' : '#d1d5db';
                document.getElementById('btn-priority').style.color = (this.viewMode === 'priority') ? 'var(--accent-orange)' : '#d1d5db';

                const colList = (this.viewMode === 'project') ? this.projects : this.prioritiesArr;
                colList.forEach(col => {
                    const columnTasks = this.tasks.filter(t => this.viewMode === 'project' ? t.project === col : t.priority === col)
                        .sort((a, b) => this.viewMode === 'project' ? (a.pOrder || 0) - (b.pOrder || 0) : (a.prioOrder || 0) - (b.prioOrder || 0));

                    const wrapper = document.createElement('div');
                    wrapper.className = "column-wrapper";
                    wrapper.dataset.colname = col;
                    const label = (this.viewMode === 'project') ? col : {red:'TODAY', orange:'THIS WEEK', yellow:'SOON', blue:'SOMEDAY'}[col];
                    
                    wrapper.innerHTML = `
                        <div class="flex items-center justify-between mb-1 mt-3 px-1 handle cursor-grab flex-shrink-0">
                            <h2 onclick="app.renameProject('${col}')" class="list-label">${label}</h2>
                            ${this.viewMode === 'project' ? `<button onclick="app.deleteProject('${col}')" class="text-gray-500 text-sm px-1">×</button>` : ''}
                        </div>
                        <button onclick="app.addTask('${col}', 'top')" class="btn-add mb-1">+</button>
                        <div class="kanban-column" data-col="${col}">
                            ${columnTasks.map(task => {
                                const isEditing = this.editingId === task.id;
                                const starColor = {red:'--star-red', orange:'--star-orange', yellow:'--star-yellow', blue:'--star-blue'}[task.priority];
                                return `
                                <div data-id="${task.id}" class="card ${isEditing ? 'ring-2 ring-orange-500/30' : ''}">
                                    ${isEditing ? `<button onclick="app.deleteTask('${task.id}')" class="absolute top-4 left-4 text-gray-400">🗑️</button>` : ''}
                                    <div class="${isEditing ? 'pl-8' : ''}" onclick="app.enterEdit('${task.id}')">
                                        ${isEditing ? `<textarea id="edit-${task.id}" onblur="app.exitEdit('${task.id}', this.value)">${task.text}</textarea>` 
                                        : `<p class="text-[14px] font-bold leading-snug pr-6 cursor-text">${task.text}</p>`}
                                    </div>
                                    <button onclick="app.openPopup('${task.id}')" class="absolute top-4 right-4 text-xl transition" style="color:var(${starColor})">★</button>
                                    <div class="mt-3 text-[10px] font-black text-gray-400 uppercase tracking-widest ${isEditing ? 'pl-8' : ''}">
                                        ${this.viewMode === 'project' ? ({red:'TODAY', orange:'THIS WEEK', yellow:'SOON', blue:'SOMEDAY'}[task.priority]) : task.project}
                                    </div>
                                </div>`;
                            }).join('')}
                        </div>
                        <button onclick="app.addTask('${col}', 'bottom')" class="btn-add mt-1 mb-4">+</button>`;
                    main.appendChild(wrapper);

                    if (!this.editingId) {
                        new Sortable(wrapper.querySelector('.kanban-column'), {
                            group: 'tasks', animation: 150, delay: 150, delayOnTouchOnly: true,
                            onEnd: (e) => {
                                const task = this.tasks.find(t => t.id === e.item.dataset.id);
                                if (this.viewMode === 'project') task.project = e.to.dataset.col; else task.priority = e.to.dataset.col;
                                const ids = Array.from(e.to.querySelectorAll('.card')).map(el => el.dataset.id);
                                this.tasks.forEach(t => {
                                    const idx = ids.indexOf(t.id);
                                    if (idx !== -1) { if (this.viewMode === 'project') t.pOrder = idx; else t.prioOrder = idx; }
                                });
                                this.save();
                            }
                        });
                    }
                });

                if (this.viewMode === 'project') {
                    const addCol = document.createElement('div');
                    addCol.className = "column-wrapper flex items-center justify-center";
                    addCol.innerHTML = `<button onclick="app.addProject()" class="w-full h-24 border border-dashed border-white/10 rounded-2xl text-gray-500 font-black text-[11px] tracking-widest uppercase hover:text-orange-500 transition mb-10">+ Project</button>`;
                    main.appendChild(addCol);
                }

                new Sortable(main, { handle: '.handle', animation: 200, delay: 150, delayOnTouchOnly: true,
                    onEnd: () => {
                        const newOrder = Array.from(main.querySelectorAll('.column-wrapper')).map(w => w.dataset.colname).filter(n => n);
                        if (this.viewMode === 'project') this.projects = newOrder; else this.prioritiesArr = newOrder;
                        this.save();
                    }
                });
                if (this.editingId) { const el = document.getElementById(`edit-${this.editingId}`); if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); } }
            },

            toggleView: function(m) { this.viewMode = m; this.render(); },
            openPopup: function(id) { this.activeTaskId = id; document.getElementById('priority-popup').classList.remove('hidden'); },
            closePopup: function() { document.getElementById('priority-popup').classList.add('hidden'); },
            setPriority: function(color) {
                const task = this.tasks.find(t => t.id === this.activeTaskId);
                if (task) {
                    task.priority = color;
                    const samePrio = this.tasks.filter(t => t.priority === color && t.id !== task.id).sort((a,b) => (a.prioOrder||0)-(b.prioOrder||0));
                    samePrio.forEach((t, i) => t.prioOrder = i + 1);
                    task.prioOrder = 0; 
                }
                this.closePopup(); this.save();
            },
            addTask: function(col, pos) {
                const val = prompt("Task Description:");
                if (!val) return;
                const newTask = { id: Date.now().toString(), text: val, project: (this.viewMode==='project'?col:this.projects[0]), priority: (this.viewMode==='priority'?col:'blue'), pOrder: 0, prioOrder: 0 };
                const colTasks = this.tasks.filter(t => this.viewMode === 'project' ? t.project === col : t.priority === col).sort((a,b)=>(this.viewMode==='project'?(a.pOrder||0)-(b.pOrder||0):(a.prioOrder||0)-(b.prioOrder||0)));
                if (pos === 'top') colTasks.unshift(newTask); else colTasks.push(newTask);
                colTasks.forEach((t, i) => { if (this.viewMode === 'project') t.pOrder = i; else t.prioOrder = i; });
                const others = this.tasks.filter(t => this.viewMode === 'project' ? t.project !== col : t.priority !== col);
                this.tasks = [...others, ...colTasks]; this.save();
            },
            enterEdit: function(id) { this.editingId = id; this.render(); },
            exitEdit: function(id, txt) { 
                this.editingId = null; 
                const t = this.tasks.find(x => x.id === id);
                if (t && txt.trim()) { t.text = txt.trim(); this.save(); } else this.render();
            },
            deleteTask: function(id) { if(confirm("Delete?")) { this.tasks = this.tasks.filter(t => t.id !== id); this.editingId = null; this.save(); }},
            addProject: function() { const n = prompt("Project Name:"); if (n) { this.projects.push(n); this.save(); }},
            renameProject: function(old) { 
                if (this.viewMode !== 'project') return;
                const n = prompt("Rename:", old); 
                if (n) { this.projects = this.projects.map(p => p===old?n:p); this.tasks.forEach(t => { if(t.project===old) t.project=n; }); this.save(); }
            },
            deleteProject: function(n) {
                if (this.projects.length > 1 && confirm("Delete Project?")) {
                    const fb = this.projects.find(p => p !== n);
                    this.tasks.forEach(t => { if(t.project===n) t.project=fb; });
                    this.projects = this.projects.filter(p => p !== n); this.save();
                }
            }
        };

        app.init();
    </script>
</body>
</html>
