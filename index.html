<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Task Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --star-blue: #3b82f6; --star-yellow: #FFD700; --star-orange: #FF8C00; --star-red: #ef4444;
            --ui-bg: #313131; --ui-shading: #3d3d3d; --accent-orange: #FF8C00; --light-gray: #d1d5db;
        }
        body { font-family: -apple-system, sans-serif; background-color: var(--ui-bg); color: #f8fafc; overscroll-behavior: none; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        nav { height: 80px; flex-shrink: 0; }
        #main-content { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; flex-grow: 1; height: calc(100vh - 80px); }
        .column-wrapper { flex: 0 0 85vw; padding: 0 12px; scroll-snap-align: center; border-right: 1px solid rgba(255, 255, 255, 0.05); display: flex; flex-direction: column; height: 100%; }
        .column-wrapper:nth-child(even) { background-color: var(--ui-shading); }
        @media (min-width: 768px) { .column-wrapper { flex: 0 0 300px; scroll-snap-align: start; } }
        .kanban-column { flex-grow: 1; overflow-y: auto; overflow-x: hidden; padding-right: 2px; margin-bottom: 4px; -webkit-overflow-scrolling: touch; }
        .kanban-column::-webkit-scrollbar { width: 3px; }
        .kanban-column::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .card { background: #ffffff; border-radius: 1.25rem; padding: 1.2rem; margin-bottom: 0.75rem; box-shadow: 0 8px 16px -4px rgba(0, 0, 0, 0.4); color: #1a1a1a; position: relative; -webkit-touch-callout: none; user-select: none; touch-action: manipulation; }
        textarea { background: transparent; border: none; outline: none; resize: none; width: 100%; font-family: inherit; font-size: 14px; font-weight: 600; color: #111827; padding: 0; margin: 0; user-select: text; }
        .list-label { color: var(--accent-orange); font-size: 14px; font-weight: 900; letter-spacing: 0.15em; text-transform: uppercase; }
        .btn-add { width: 100%; padding: 6px; font-size: 24px; font-weight: 300; color: rgba(255,255,255,0.15); border-radius: 0.75rem; transition: all 0.2s; line-height: 1; flex-shrink: 0; }
        .btn-add:hover { color: var(--accent-orange); }
        #lock-screen { position: fixed; inset: 0; z-index: 200; background: var(--ui-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .glass { background: rgba(49, 49, 49, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <!-- Access Screen -->
    <div id="lock-screen">
        <h1 class="text-[#d1d5db] text-[18px] font-black tracking-[0.5em] uppercase mb-10">Private Vault</h1>
        <div class="flex flex-col gap-4 w-72">
            <input type="password" id="vault-password" placeholder="Enter Password" class="bg-[#3d3d3d] border border-white/10 rounded-full px-6 py-4 text-white text-center text-sm outline-none focus:border-[#FF8C00] transition-all">
            <button id="unlock-btn" class="bg-[#FF8C00] text-white py-4 rounded-full font-bold text-xs tracking-widest uppercase shadow-xl hover:scale-105 transition-all">
                Access Data
            </button>
        </div>
        <p id="system-ready" class="text-white/10 text-[9px] mt-12 uppercase tracking-[0.3em]">Loading System...</p>
    </div>

    <!-- App Content -->
    <div id="app-content" class="hidden h-full flex flex-col">
        <nav class="flex justify-between items-center px-8 py-4 glass z-50">
            <div class="flex flex-col">
                <h1 class="text-[14px] font-black tracking-[0.3em] uppercase text-[#d1d5db] mb-1">Task Manager</h1>
                <div class="flex gap-6">
                    <button id="btn-project-toggle" class="text-[14px] font-bold uppercase transition">Projects</button>
                    <button id="btn-priority-toggle" class="text-[14px] font-bold uppercase transition">Priorities</button>
                </div>
            </div>
            <button id="btn-lock" class="text-[10px] font-black text-[#d1d5db] uppercase tracking-widest hover:text-[#FF8C00]">Lock Vault</button>
        </nav>
        <div id="main-content"></div>
    </div>

    <!-- Priority Picker -->
    <div id="priority-popup" class="hidden fixed inset-0 bg-black/70 backdrop-blur-md flex items-end sm:items-center justify-center z-[100]">
        <div class="w-full sm:w-80 bg-[#313131] p-8 rounded-t-[2.5rem] sm:rounded-[3rem] border border-white/5 text-center shadow-2xl">
            <div id="priority-buttons" class="flex flex-col gap-2"></div>
            <button id="btn-close-popup" class="mt-8 text-[12px] font-bold text-gray-400 uppercase tracking-widest text-center w-full">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCRSI7mZQDo6WiECYM4Cbh3ZEOZjnH6YaU",
            authDomain: "my-tasks-319e9.firebaseapp.com",
            databaseURL: "https://my-tasks-319e9-default-rtdb.firebaseio.com",
            projectId: "my-tasks-319e9",
            storageBucket: "my-tasks-319e9.firebasestorage.app",
            messagingSenderId: "789706458775",
            appId: "1:789706458775:web:bf61fcdba5d9cbf59f4bd2"
        };

        const fbApp = initializeApp(firebaseConfig);
        const db = getDatabase(fbApp);

        // Core State
        const state = {
            vaultKey: localStorage.getItem('task_vault_v3') || "",
            tasks: [],
            projects: ["Inbox"],
            prioritiesArr: ["red", "orange", "yellow", "blue"],
            viewMode: 'project',
            activeTaskId: null,
            editingId: null
        };

        // --- CORE FUNCTIONS ---
        const save = () => {
            if (!state.vaultKey) return;
            set(ref(db, 'vaults/' + state.vaultKey), { 
                tasks: state.tasks, 
                projects: state.projects, 
                priorities: state.prioritiesArr 
            });
        };

        const render = () => {
            const main = document.getElementById('main-content');
            if(!main) return;
            main.innerHTML = '';
            
            document.getElementById('btn-project-toggle').style.color = (state.viewMode === 'project') ? 'var(--accent-orange)' : '#d1d5db';
            document.getElementById('btn-priority-toggle').style.color = (state.viewMode === 'priority') ? 'var(--accent-orange)' : '#d1d5db';

            const colList = (state.viewMode === 'project') ? state.projects : state.prioritiesArr;
            
            colList.forEach(col => {
                const columnTasks = state.tasks.filter(t => state.viewMode === 'project' ? t.project === col : t.priority === col)
                    .sort((a, b) => state.viewMode === 'project' ? (a.pOrder || 0) - (b.pOrder || 0) : (a.prioOrder || 0) - (b.prioOrder || 0));

                const wrapper = document.createElement('div');
                wrapper.className = "column-wrapper";
                wrapper.dataset.colname = col;
                const label = (state.viewMode === 'project') ? col : {red:'TODAY', orange:'THIS WEEK', yellow:'SOON', blue:'SOMEDAY'}[col];
                
                wrapper.innerHTML = `
                    <div class="flex items-center justify-between mb-1 mt-3 px-1 handle cursor-grab flex-shrink-0">
                        <h2 class="list-label btn-rename" data-col="${col}">${label}</h2>
                        ${state.viewMode === 'project' ? `<button class="text-gray-500 text-sm px-1 btn-delete-proj" data-col="${col}">×</button>` : ''}
                    </div>
                    <button class="btn-add mb-1 btn-add-top" data-col="${col}">+</button>
                    <div class="kanban-column" data-col="${col}">
                        ${columnTasks.map(task => {
                            const isEditing = state.editingId === task.id;
                            const starColor = {red:'--star-red', orange:'--star-orange', yellow:'--star-yellow', blue:'--star-blue'}[task.priority];
                            return `
                            <div data-id="${task.id}" class="card ${isEditing ? 'ring-2 ring-orange-500/30' : ''}">
                                ${isEditing ? `<button class="absolute top-4 left-4 text-gray-400 btn-kill-task" data-id="${task.id}">🗑️</button>` : ''}
                                <div class="${isEditing ? 'pl-8' : ''} btn-trigger-edit" data-id="${task.id}">
                                    ${isEditing ? `<textarea id="edit-${task.id}">${task.text}</textarea>` 
                                    : `<p class="text-[14px] font-bold leading-snug pr-6 cursor-text">${task.text}</p>`}
                                </div>
                                <button class="absolute top-4 right-4 text-xl transition btn-open-prio" data-id="${task.id}" style="color:var(${starColor})">★</button>
                                <div class="mt-3 text-[10px] font-black text-gray-400 uppercase tracking-widest ${isEditing ? 'pl-8' : ''}">
                                    ${state.viewMode === 'project' ? ({red:'TODAY', orange:'THIS WEEK', yellow:'SOON', blue:'SOMEDAY'}[task.priority]) : task.project}
                                </div>
                            </div>`;
                        }).join('')}
                    </div>
                    <button class="btn-add mt-1 mb-4 btn-add-bottom" data-col="${col}">+</button>`;
                main.appendChild(wrapper);

                // Tasks Sorting
                if (!state.editingId) {
                    new Sortable(wrapper.querySelector('.kanban-column'), {
                        group: 'tasks', animation: 150, delay: 150, delayOnTouchOnly: true,
                        onEnd: (e) => {
                            const task = state.tasks.find(t => t.id === e.item.dataset.id);
                            if (state.viewMode === 'project') task.project = e.to.dataset.col; else task.priority = e.to.dataset.col;
                            const ids = Array.from(e.to.querySelectorAll('.card')).map(el => el.dataset.id);
                            state.tasks.forEach(t => {
                                const idx = ids.indexOf(t.id);
                                if (idx !== -1) { if (state.viewMode === 'project') t.pOrder = idx; else t.prioOrder = idx; }
                            });
                            save();
                        }
                    });
                }
            });

            if (state.viewMode === 'project') {
                const addCol = document.createElement('div');
                addCol.className = "column-wrapper flex items-center justify-center";
                addCol.innerHTML = `<button id="btn-new-project" class="w-full h-24 border border-dashed border-white/10 rounded-2xl text-gray-500 font-black text-[11px] tracking-widest uppercase hover:text-orange-500 transition mb-10">+ Project</button>`;
                main.appendChild(addCol);
            }

            // Columns Sorting
            new Sortable(main, { handle: '.handle', animation: 200, delay: 150, delayOnTouchOnly: true,
                onEnd: () => {
                    const newOrder = Array.from(main.querySelectorAll('.column-wrapper')).map(w => w.dataset.colname).filter(n => n);
                    if (state.viewMode === 'project') state.projects = newOrder; else state.prioritiesArr = newOrder;
                    save();
                }
            });

            if (state.editingId) { 
                const el = document.getElementById(`edit-${state.editingId}`); 
                if (el) {
                    el.focus(); el.setSelectionRange(el.value.length, el.value.length);
                    el.onblur = () => {
                        const txt = el.value.trim();
                        const t = state.tasks.find(x => x.id === state.editingId);
                        if (t && txt) t.text = txt;
                        state.editingId = null;
                        save();
                    };
                }
            }
            attachEventListeners();
        };

        // --- EVENT DELEGATION (Fixes "Nothing Happens" on Buttons) ---
        function attachEventListeners() {
            document.querySelectorAll('.btn-add-top').forEach(b => b.onclick = () => addTask(b.dataset.col, 'top'));
            document.querySelectorAll('.btn-add-bottom').forEach(b => b.onclick = () => addTask(b.dataset.col, 'bottom'));
            document.querySelectorAll('.btn-open-prio').forEach(b => b.onclick = () => { state.activeTaskId = b.dataset.id; document.getElementById('priority-popup').classList.remove('hidden'); });
            document.querySelectorAll('.btn-trigger-edit').forEach(b => b.onclick = () => { state.editingId = b.dataset.id; render(); });
            document.querySelectorAll('.btn-kill-task').forEach(b => b.onclick = () => { if(confirm("Delete?")) { state.tasks = state.tasks.filter(t => t.id !== b.dataset.id); state.editingId = null; save(); }});
            document.querySelectorAll('.btn-rename').forEach(b => b.onclick = () => {
                if (state.viewMode !== 'project') return;
                const n = prompt("Rename:", b.dataset.col);
                if (n) { state.projects = state.projects.map(p => p===b.dataset.col?n:p); state.tasks.forEach(t => { if(t.project===b.dataset.col) t.project=n; }); save(); }
            });
            document.querySelectorAll('.btn-delete-proj').forEach(b => b.onclick = () => {
                if (state.projects.length > 1 && confirm("Delete Project?")) {
                    const fb = state.projects.find(p => p !== b.dataset.col);
                    state.tasks.forEach(t => { if(t.project===b.dataset.col) t.project=fb; });
                    state.projects = state.projects.filter(p => p !== b.dataset.col);
                    save();
                }
            });
            const np = document.getElementById('btn-new-project');
            if(np) np.onclick = () => { const n = prompt("Project Name:"); if (n) { state.projects.push(n); save(); }};
        }

        const addTask = (col, pos) => {
            const val = prompt("Task Description:");
            if (!val) return;
            const newTask = { id: Date.now().toString(), text: val, project: (state.viewMode==='project'?col:state.projects[0]), priority: (state.viewMode==='priority'?col:'blue'), pOrder: 0, prioOrder: 0 };
            const colTasks = state.tasks.filter(t => state.viewMode === 'project' ? t.project === col : t.priority === col).sort((a,b)=>(state.viewMode==='project'?(a.pOrder||0)-(b.pOrder||0):(a.prioOrder||0)-(b.prioOrder||0)));
            if (pos === 'top') colTasks.unshift(newTask); else colTasks.push(newTask);
            colTasks.forEach((t, i) => { if (state.viewMode === 'project') t.pOrder = i; else t.prioOrder = i; });
            const others = state.tasks.filter(t => state.viewMode === 'project' ? t.project !== col : t.priority !== col);
            state.tasks = [...others, ...colTasks]; save();
        };

        // --- SYSTEM ACTIONS ---
        const initSync = () => {
            const dataRef = ref(db, 'vaults/' + state.vaultKey);
            onValue(dataRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    state.tasks = data.tasks || [];
                    state.projects = data.projects || ["Inbox"];
                    state.prioritiesArr = data.priorities || ["red", "orange", "yellow", "blue"];
                    render();
                } else {
                    save(); 
                }
            });
        };

        // EXPOSE TO HTML
        document.getElementById('unlock-btn').onclick = () => {
            const p = document.getElementById('vault-password').value.trim();
            if (p.length < 4) return alert("Key too short.");
            state.vaultKey = btoa(p + "_secure_jnymac").replace(/[/+=]/g, "");
            localStorage.setItem('task_vault_v3', state.vaultKey);
            document.getElementById('lock-screen').classList.add('hidden');
            document.getEl
