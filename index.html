<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Task Manager Pro v2.2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --star-blue: #3b82f6; --star-yellow: #FFD700; --star-orange: #FF8C00; --star-red: #ef4444;
            --ui-bg: #313131; --ui-shading: #4a4a4a; --accent-orange: #FF8C00; --light-gray: #d1d5db;
            --tag-green: #679F16; --person-blue: #64ACC5;
            --text-muted: #94a3b8; /* Lighter than 666666 */
            --text-subtle: #d1d5db; /* Lighter than 464646 */
        }
        body { font-family: -apple-system, sans-serif; background-color: var(--ui-bg); color: #f8fafc; overscroll-behavior: none; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        nav { height: 80px; flex-shrink: 0; }
        
        #main-content { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; flex-grow: 1; height: 100%; }
        .column-wrapper { flex: 0 0 85vw; padding: 0 12px; scroll-snap-align: center; border-right: 1px solid rgba(255, 255, 255, 0.05); display: flex; flex-direction: column; height: 100%; }
        .column-wrapper:nth-child(even) { background-color: var(--ui-shading); }
        @media (min-width: 768px) { .column-wrapper { flex: 0 0 320px; scroll-snap-align: start; } }
        
        .kanban-column { flex-grow: 1; overflow-y: auto; overflow-x: hidden; padding-right: 2px; margin-bottom: 4px; -webkit-overflow-scrolling: touch; }
        .kanban-column::-webkit-scrollbar { width: 3px; }
        .kanban-column::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .card { background: #ffffff; border-radius: 1.25rem; padding: 1.2rem; margin-bottom: 0.75rem; box-shadow: 0 8px 16px -4px rgba(0, 0, 0, 0.4); color: #1a1a1a; position: relative; -webkit-touch-callout: none; user-select: none; touch-action: manipulation; }
        textarea { background: transparent; border: none; outline: none; resize: none; width: 100%; font-family: inherit; font-size: 14px; font-weight: 600; color: #111827; padding: 0; margin: 0; user-select: text; }
        
        .list-label { color: var(--accent-orange); font-size: 14px; font-weight: 900; letter-spacing: 0.15em; text-transform: uppercase; }
        .btn-add { width: 100%; padding: 6px; font-size: 24px; font-weight: 300; color: rgba(255,255,255,0.15); border-radius: 0.75rem; transition: all 0.2s; line-height: 1; flex-shrink: 0; }
        .btn-add:hover { color: var(--accent-orange); }
        
        .glass { background: rgba(49, 49, 49, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        #login-screen { position: fixed; inset: 0; z-index: 9999; background: var(--ui-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .version-badge { background: rgba(255, 255, 255, 0.05); color: rgba(255, 255, 255, 0.3); padding: 4px 12px; border-radius: 99px; font-size: 10px; font-weight: 800; letter-spacing: 1px; margin-top: 10px; }

        .mention { text-decoration: underline; color: var(--person-blue); font-weight: 700; }
        .hashtag { text-decoration: underline; color: var(--tag-green); font-weight: 700; }

        #filter-drawer { background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(255,255,255,0.05); padding: 0; height: 0; overflow: hidden; transition: all 0.2s ease-out; flex-shrink: 0; }
        #filter-drawer.expanded { height: auto; padding: 15px 20px; }
        .filter-group { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .filter-group:last-child { margin-bottom: 0; }
        .filter-group-label { font-size: 10px; font-weight: 900; color: var(--text-muted); width: 80px; text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; }
        .filter-pill { padding: 3px 10px; border-radius: 99px; font-size: 10px; font-weight: 800; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: all 0.2s; color: var(--text-muted); text-transform: uppercase; }
        .filter-pill.active { background: var(--accent-orange); color: white; border-color: var(--accent-orange); }
        
        .mode-toggle { display: flex; background: #222; padding: 2px; border-radius: 8px; align-items: center; }
        .mode-toggle button { font-size: 9px; font-weight: 900; padding: 4px 10px; border-radius: 6px; color: var(--text-muted); }
        .mode-toggle .active { background: var(--accent-orange); color: white; }

        .btn-filter-toggle { font-size: 10px; font-weight: 900; color: var(--text-muted); border: 1px solid rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 8px; margin-left: 20px; display: none; transition: all 0.2s; }
        .btn-filter-toggle.active { border-color: var(--accent-orange); color: var(--accent-orange); }
        .btn-filter-toggle.open .chevron { transform: rotate(180deg); }
        .chevron { display: inline-block; transition: transform 0.2s; margin-left: 5px; }

        #btn-clear-filters { font-size: 9px; font-weight: 900; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; padding: 4px 10px; border: 1px solid rgba(255,255,255,0.05); border-radius: 6px; margin-left: 10px; }
        #btn-clear-filters:hover { color: white; border-color: white; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 class="text-[#d1d5db] text-[20px] font-black tracking-[0.5em] uppercase">Private Vault</h1>
        <div class="version-badge">VERSION 2.2.0</div>
        <div class="flex flex-col gap-4 w-72 mt-12">
            <button id="main-login-btn" onclick="handleLoginRequest()" class="bg-[#FF8C00] text-white py-4 rounded-full font-bold text-sm tracking-widest uppercase shadow-xl hover:bg-orange-600 active:scale-95 transition-all">
                Sign in with Google
            </button>
        </div>
        <p id="boot-log" class="text-white/10 text-[10px] mt-12 uppercase tracking-[0.3em] px-10">Access restricted to owner</p>
    </div>

    <div id="app-content" style="display:none" class="h-full flex flex-col">
        <nav class="flex justify-between items-center px-8 py-4 glass z-50">
            <div class="flex flex-col sm:flex-row sm:items-center">
                <h1 class="text-[14px] font-black tracking-[0.3em] uppercase text-[#d1d5db] mb-1 sm:mb-0 sm:mr-8">Task Manager (2.2.0)</h1>
                <div class="flex items-center gap-4">
                    <div class="flex gap-4">
                        <button id="nav-btn-project" class="text-[14px] font-bold uppercase transition">Projects</button>
                        <button id="nav-btn-priority" class="text-[14px] font-bold uppercase transition">Priorities</button>
                    </div>
                    <button id="btn-filter-toggle" class="btn-filter-toggle items-center">
                        FILTERS <span class="chevron">▾</span>
                    </button>
                </div>
            </div>
            <button id="nav-btn-logout" class="text-[10px] font-black text-[#d1d5db] uppercase tracking-widest hover:text-[#FF8C00]">Sign Out</button>
        </nav>
        
        <div id="filter-drawer"></div>
        <div id="main-content"></div>
    </div>

    <div id="priority-popup" class="hidden fixed inset-0 bg-black/70 backdrop-blur-md flex items-end sm:items-center justify-center z-[100]">
        <div class="w-full sm:w-80 bg-[#313131] p-8 rounded-t-[2.5rem] sm:rounded-[3rem] border border-white/5 text-center shadow-2xl">
            <div id="prio-list-container" class="flex flex-col gap-2"></div>
            <button id="btn-prio-cancel" class="mt-8 text-[12px] font-bold text-gray-400 uppercase tracking-widest text-center w-full">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithPopup, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCRSI7mZQDo6WiECYM4Cbh3ZEOZjnH6YaU",
            authDomain: "my-tasks-319e9.firebaseapp.com",
            databaseURL: "https://my-tasks-319e9-default-rtdb.firebaseio.com",
            projectId: "my-tasks-319e9",
            storageBucket: "my-tasks-319e9.firebasestorage.app",
            messagingSenderId: "789706458775",
            appId: "1:789706458775:web:bf61fcdba5d9cbf59f4bd2",
            measurementId: "G-WLKSCG3P1D"
        };

        const fbApp = initializeApp(firebaseConfig);
        const db = getDatabase(fbApp);
        const auth = getAuth(fbApp);
        const provider = new GoogleAuthProvider();

        window.TM = {
            user: null, tasks: [], projects: ["Inbox"], priorities: ["red", "orange", "yellow", "blue"],
            view: 'project', editing: null, activeFilters: [], filterMode: 'any', filtersExpanded: false,

            save: function() {
                if (!this.user) return;
                set(ref(db, 'vaults/jnymac_main_vault'), { tasks: this.tasks, projects: this.projects, priorities: this.priorities });
            },

            init: function() {
                onValue(ref(db, 'vaults/jnymac_main_vault'), (snap) => {
                    const d = snap.val();
                    if (d) {
                        this.tasks = d.tasks || [];
                        this.projects = d.projects || ["Inbox"];
                        this.priorities = d.priorities || ["red", "orange", "yellow", "blue"];
                        this.render();
                    } else { this.save(); }
                });
            },

            getFilterOptions: function() {
                const people = new Set(); const tags = new Set();
                this.tasks.forEach(t => {
                    (t.text.match(/@\w+/g) || []).forEach(p => people.add(p));
                    (t.text.match(/#\w+/g) || []).forEach(tg => tags.add(tg));
                });
                return { projects: this.projects, people: Array.from(people).sort(), tags: Array.from(tags).sort() };
            },

            renderFilterDrawer: function() {
                const drawer = document.getElementById('filter-drawer');
                const toggleBtn = document.getElementById('btn-filter-toggle');
                if (this.view !== 'priority') { drawer.classList.remove('expanded'); toggleBtn.style.display = 'none'; return; }

                toggleBtn.style.display = 'flex';
                if (this.filtersExpanded) { drawer.classList.add('expanded'); toggleBtn.classList.add('open'); }
                else { drawer.classList.remove('expanded'); toggleBtn.classList.remove('open'); }

                if (this.activeFilters.length > 0) toggleBtn.classList.add('active');
                else toggleBtn.classList.remove('active');

                drawer.innerHTML = '';
                const options = this.getFilterOptions();
                
                const controlRow = document.createElement('div');
                controlRow.className = "flex items-center mb-5 pb-3 border-b border-white/5";
                controlRow.innerHTML = `
                    <span class="text-[9px] font-black text-gray-500 uppercase mr-3">Match Mode:</span>
                    <div class="mode-toggle">
                        <button id="mode-any" class="${this.filterMode==='any'?'active':''}">ANY</button>
                        <button id="mode-all" class="${this.filterMode==='all'?'active':''}">ALL</button>
                    </div>
                    <button id="btn-clear-filters">Clear All</button>
                `;
                drawer.appendChild(controlRow);

                document.getElementById('mode-any').onclick = () => { this.filterMode = 'any'; this.render(); };
                document.getElementById('mode-all').onclick = () => { this.filterMode = 'all'; this.render(); };
                document.getElementById('btn-clear-filters').onclick = () => { this.activeFilters = []; this.render(); };

                const addCategory = (label, list, type) => {
                    if (list.length === 0) return;
                    const group = document.createElement('div');
                    group.className = "filter-group";
                    group.innerHTML = `<span class="filter-group-label">${label}</span>`;
                    list.forEach(val => {
                        const pill = document.createElement('div');
                        const isActive = this.activeFilters.some(f => f.val === val && f.type === type);
                        pill.className = `filter-pill ${isActive ? 'active' : ''}`;
                        pill.innerText = val;
                        pill.onclick = () => {
                            if (isActive) this.activeFilters = this.activeFilters.filter(f => !(f.val === val && f.type === type));
                            else this.activeFilters.push({ val, type });
                            this.render();
                        };
                        group.appendChild(pill);
                    });
                    drawer.appendChild(group);
                };

                addCategory('Projects', options.projects, 'project');
                addCategory('People', options.people, 'person');
                addCategory('Tags', options.tags, 'tag');
            },

            formatText: function(str) {
                return str.replace(/(@\w+)/g, '<u class="mention">$1</u>').replace(/(#\w+)/g, '<u class="hashtag">$1</u>');
            },

            render: function() {
                const main = document.getElementById('main-content');
                if(!main) return;
                main.innerHTML = '';
                this.renderFilterDrawer();

                document.getElementById('nav-btn-project').style.color = (this.view === 'project') ? 'var(--accent-orange)' : 'var(--text-subtle)';
                document.getElementById('nav-btn-priority').style.color = (this.view === 'priority') ? 'var(--accent-orange)' : 'var(--text-subtle)';

                const cols = (this.view === 'project') ? this.projects : this.priorities;
                
                cols.forEach(col => {
                    let filteredTasks = this.tasks.filter(t => this.view === 'project' ? t.project === col : t.priority === col)
                        .sort((a, b) => this.view === 'project' ? (a.pOrder || 0) - (b.pOrder || 0) : (a.prioOrder || 0) - (b.prioOrder || 0));

                    if (this.view === 'priority' && this.activeFilters.length > 0) {
                        filteredTasks = filteredTasks.filter(t => {
                            const matches = this.activeFilters.map(f => {
                                if (f.type === 'project') return t.project === f.val;
                                return t.text.includes(f.val);
                            });
                            return this.filterMode === 'all' ? matches.every(m => m) : matches.some(m => m);
                        });
                    }

                    const wrap = document.createElement('div');
                    wrap.className = "column-wrapper pt-4";
                    wrap.dataset.colname = col;
                    const label = (this.view === 'project') ? col : {red:'TODAY', orange:'WEEK', yellow:'SOON', blue:'SOMEDAY'}[col];

                    wrap.innerHTML = `
                        <div class="flex items-center justify-between mb-1 mt-3 px-1 handle cursor-grab flex-shrink-0">
                            <h2 class="list-label title-click" data-col="${col}">${label}</h2>
                            ${this.view === 'project' ? `<button class="text-gray-500 text-sm px-1 proj-del" data-col="${col}">×</button>` : ''}
                        </div>
                        <button class="btn-add mb-1 add-at-pos" data-col="${col}" data-pos="top">+</button>
                        <div class="kanban-column" data-col="${col}">
                            ${filteredTasks.map(t => {
                                const isEdit = this.editing === t.id;
                                const star = {red:'--star-red', orange:'--star-orange', yellow:'--star-yellow', blue:'--star-blue'}[t.priority];
                                return `
                                <div data-id="${t.id}" class="card ${isEdit ? 'ring-2 ring-orange-500/30' : ''}">
                                    ${isEdit ? `<button class="absolute top-4 left-4 text-gray-400 del-task" data-id="${t.id}">🗑️</button>` : ''}
                                    <div class="${isEdit ? 'pl-8' : ''} trigger-edit" data-id="${t.id}">
                                        ${isEdit ? `<textarea id="edit-${t.id}">${t.text}</textarea>` : `<p class="text-[14px] font-bold leading-snug pr-6 cursor-text">${this.formatText(t.text)}</p>`}
                                    </div>
                                    <button class="absolute top-4 right-4 text-xl open-prio" data-id="${t.id}" style="color:var(${star})">★</button>
                                    <div class="mt-3 text-[10px] font-black text-gray-400 uppercase tracking-widest ${isEdit ? 'pl-8' : ''}">
                                        ${this.view === 'project' ? labelPriority(t.priority) : t.project}
                                    </div>
                                </div>`;
                            }).join('')}
                        </div>
                        <button class="btn-add mt-1 mb-4 add-at-pos" data-col="${col}" data-pos="bottom">+</button>`;
                    main.appendChild(wrap);

                    new Sortable(wrap.querySelector('.kanban-column'), {
                        group: 'tasks', animation: 150, delay: 150, delayOnTouchOnly: true,
                        onEnd: (e) => {
                            const task = this.tasks.find(t => t.id === e.item.dataset.id);
                            if (this.view === 'project') task.project = e.to.dataset.col; else task.priority = e.to.dataset.col;
                            const ids = Array.from(e.to.querySelectorAll('.card')).map(el => el.dataset.id);
                            this.tasks.forEach(t => {
                                const idx = ids.indexOf(t.id);
                                if (idx !== -1) { if (this.view === 'project') t.pOrder = idx; else t.prioOrder = idx; }
                            });
                            this.save();
                        }
                    });
                });

                if (this.view === 'project') {
                    const b = document.createElement('div'); b.className = "column-wrapper flex items-center justify-center";
                    b.innerHTML = `<button id="create-proj-btn" class="w-full h-24 border border-dashed border-white/10 rounded-2xl text-gray-500 font-black text-[11px] uppercase tracking-widest">+ Project</button>`;
                    main.appendChild(b);
                    document.getElementById('create-proj-btn').onclick = () => { const n = prompt("Project Name:"); if(n) { this.projects.push(n); this.save(); }};
                }

                new Sortable(main, { handle: '.handle', animation: 200, onEnd: () => {
                    const newOrder = Array.from(main.querySelectorAll('.column-wrapper')).map(w => w.dataset.colname).filter(n => n);
                    if (this.view === 'project') this.projects = newOrder; else this.priorities = newOrder;
                    this.save();
                }});

                if (this.editing) {
                    const el = document.getElementById(`edit-${this.editing}`);
                    if (el) {
                        el.focus(); el.setSelectionRange(el.value.length, el.value.length);
                        el.onblur = () => { const txt = el.value.trim(); if(txt) this.tasks.find(t=>t.id===this.editing).text = txt; this.editing = null; this.save(); };
                    }
                }
                this.bindEvents();
            },

            bindEvents: function() {
                document.querySelectorAll('.add-at-pos').forEach(b => b.onclick = () => {
                    const val = prompt("New Task:"); if(!val) return;
                    const newTask = { id: Date.now().toString(), text: val, project: (this.view==='project'?b.dataset.col:this.projects[0]), priority: (this.view==='priority'?b.dataset.col:'blue'), pOrder: 0, prioOrder: 0 };
                    const colTasks = this.tasks.filter(t => this.view === 'project' ? t.project === b.dataset.col : t.priority === b.dataset.col).sort((a,b)=>(this.view==='project'?(a.pOrder||0)-(b.pOrder||0):(a.prioOrder||0)-(b.prioOrder||0)));
                    if (b.dataset.pos === 'top') colTasks.unshift(newTask); else colTasks.push(newTask);
                    colTasks.forEach((t, i) => { if (this.view === 'project') t.pOrder = i; else t.prioOrder = i; });
                    const others = this.tasks.filter(t => this.view === 'project' ? t.project !== b.dataset.col : t.priority !== b.dataset.col);
                    this.tasks = [...others, ...colTasks]; this.save();
                });
                document.querySelectorAll('.open-prio').forEach(b => b.onclick = () => { this.activeTask = b.dataset.id; document.getElementById('priority-popup').classList.remove('hidden'); });
                document.querySelectorAll('.trigger-edit').forEach(b => b.onclick = () => { this.editing = b.dataset.id; this.render(); });
                document.querySelectorAll('.del-task').forEach(b => b.onclick = () => { if(confirm("Delete Task?")) { this.tasks = this.tasks.filter(t => t.id !== b.dataset.id); this.editing = null; this.save(); }});
                document.querySelectorAll('.title-click').forEach(b => b.onclick = () => { if (this.view !== 'project') return; const n = prompt("Rename:", b.dataset.col); if (n) { this.projects = this.projects.map(p => p===b.dataset.col?n:p); this.tasks.forEach(t => { if(t.project===b.dataset.col) t.project=n; }); this.save(); } });
                document.querySelectorAll('.proj-del').forEach(b => b.onclick = () => { if (this.projects.length > 1 && confirm("Delete Project?")) { const fb = this.projects.find(p => p !== b.dataset.col); this.tasks.forEach(t => { if (t.project===b.dataset.col) t.project=fb; }); this.projects = this.projects.filter(p => p !== b.dataset.col); this.save(); } });
            }
        };

        // --- AUTH ---
        async function handleAuth() {
            try {
                // Check if we just returned from a redirect
                const result = await getRedirectResult(auth);
                if (result?.user) processUser(result.user);
            } catch (e) { console.error("Redirect check failed", e); }

            onAuthStateChanged(auth, (user) => {
                if (user) processUser(user);
                else { document.getElementById('login-screen').style.display = 'flex'; document.getElementById('app-content').style.display = 'none'; }
            });
        }

        function processUser(user) {
            const log = document.getElementById('boot-log');
            if (user.email.toLowerCase() === "jnymac@gmail.com") {
                TM.user = user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'flex';
                TM.init();
            } else {
                log.innerText = "Denied: " + user.email; log.style.color = "red";
                setTimeout(() => signOut(auth), 3000);
            }
        }

        window.handleLoginRequest = () => {
            if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) signInWithRedirect(auth, provider);
            else signInWithPopup(auth, provider).catch(e => console.error(e));
        };

        handleAuth();

        document.getElementById('nav-btn-logout').onclick = () => signOut(auth).then(() => window.location.reload());
        document.getElementById('nav-btn-
